name: Newman API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run CRUD tests
        run: newman run "JSONPlaceholder-CRUD.postman_collection.json" --environment "JSONPlaceholder.postman_environment.json" --iteration-data posts-data.csv


